services:
  - type: web
    name: open-id-connect-sso-sample
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      # ★ Set the following manually in Render Dashboard
      # BASE_URL: The URL Render assigns after deployment (e.g. https://your-service.onrender.com)
      # CLIENT_ID: Client ID to register in Shopify
      # CLIENT_SECRET: Client secret to register in Shopify
      # SHOPIFY_API_SECRET: API secret key of your Shopify app (used to verify session tokens in /userinfo)
